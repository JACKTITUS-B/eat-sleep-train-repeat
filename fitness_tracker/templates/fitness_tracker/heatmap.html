{% extends 'fitness_tracker/base.html' %}
{% load static %}

{% block title %}Workout Heatmap{% endblock %}

{% block content %}
<style>
    /* Main layout for the heatmap diagrams */
    .heatmap-wrapper {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 2rem;
        flex-wrap: wrap;
    }
    .heatmap-container {
        position: relative;
        width: 300px; 
        height: 532px;
    }
    .heatmap-container img,
    .heatmap-container svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    /* Base style for all SVG muscle paths */
    .muscle {
        fill: rgba(128, 128, 128, 0.2);
        stroke: none;
        opacity: 0.8;
        transition: opacity 0.3s;
    }
    .muscle:hover {
        opacity: 1.0;
    }
    
    /* --- LEGEND STYLES --- */
    .heatmap-legend {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
        margin: 1rem auto 2rem auto;
        padding: 0.5rem;
    }
    .legend-item {
        display: flex;
        align-items: center;
    }
    .legend-color-box {
        width: 25px;
        height: 15px;
        display: inline-block;
        margin-right: 8px;
        border-radius: 3px;
    }
    .legend-label {
        color: #f0f0f0;
        font-size: 0.9rem;
    }

    /* --- DYNAMIC COLORS FOR BOTH SVG AND LEGEND --- */
    /* SVG Fill Colors */
    .muscle.overtrained { fill: #df5555ff; }
    .muscle.well-trained { fill: #e7e374ff; }
    .muscle.undertrained { fill: #3d9fe0ff; }

    /* Legend Box Background Colors */
    .legend-color-box.overtrained { background-color: #e04040ff; } /* Red */
    .legend-color-box.well-trained { background-color: #ffce56; } /* Yellow */
    .legend-color-box.undertrained { background-color: #36a2eb; } /* Blue */
    .legend-color-box.not-trained { background-color: rgba(255, 255, 255, 0.2); } /* Grey */
</style>
<div class="heatmap-legend">
    <div class="legend-item">
        <span class="legend-color-box overtrained"></span>
        <span class="legend-label">Overtrained</span>
    </div>
    <div class="legend-item">
        <span class="legend-color-box well-trained"></span>
        <span class="legend-label">Well-Trained</span>
    </div>
    <div class="legend-item">
        <span class="legend-color-box undertrained"></span>
        <span class="legend-label">Undertrained</span>
    </div>
    <div class="legend-item">
        <span class="legend-color-box not-trained"></span>
        <span class="legend-label">Not Trained</span>
    </div>
</div>
